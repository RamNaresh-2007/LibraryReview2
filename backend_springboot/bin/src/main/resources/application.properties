spring.application.name=digital-library-management
spring.main.allow-circular-references=true

# ── PostgreSQL / H2 ──────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:library_db;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ── JPA / Hibernate (CO1: ORM, Three-Schema Model) ──────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# CO1: Transaction isolation level — READ_COMMITTED (default, prevents dirty reads)
spring.jpa.properties.hibernate.connection.isolation=2

# ── Server ───────────────────────────────────────────────────────────────────
server.port=8085

# ── JWT (CO3: Authentication & Security) ─────────────────────────────────────
jwt.secret=LibraryManagement2026SecretKeyForJWTAuthenticationMustBe256Bits!
jwt.expiration=86400000

# ── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:5173,http://localhost:8000

# ── Actuator (CO4: Spring Boot Actuator — health, metrics, info) ─────────────
management.endpoints.web.exposure.include=health,info,metrics,beans,mappings,env
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Digital Library Management System
info.app.version=2.0.0
info.app.description=Full-stack RDBMS + NoSQL + FastAPI + Spring Boot + React

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.library=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ── OpenAPI / Swagger (CO3: REST Documentation) ──────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.show-actuator=true
